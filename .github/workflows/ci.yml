name: Cargo Build & Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Read-only token: both jobs only check out and build/test the repo (CodeQL hardening).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Rust project - Build and Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        toolchain: [ stable ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Don't persist the GITHUB_TOKEN in .git/config (zizmor `artipacked`); the job only builds.
          persist-credentials: false

      - name: Set up Rust
        run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}

      - name: Install protobuf compiler
        # Kept explicit to ensure protoc is always available in CI (the prometheus crate's
        # build script needs it).
        run: sudo apt-get install -y protobuf-compiler

      - name: Install just
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: just

      # Every step runs a single `just` recipe so the exact command can be reproduced locally
      # (see the Justfile / .github/copilot-instructions.md).
      - name: Build
        run: just build

      - name: Run Clippy
        run: just clippy

      - name: Test
        run: just test

  synthetic_verify:
    name: Synthetic non-divergence
    runs-on: ubuntu-latest
    # Bound the job so a stalled Docker pull or a benchmark deadlock can't run for hours.
    timeout-minutes: 20
    # The default token is read-only (top-level `permissions`); this job also upserts a sticky PR
    # comment with the A/B diff, which needs pull-requests: write.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Don't persist the GITHUB_TOKEN in .git/config (zizmor `artipacked`); this job runs
          # third-party Docker images and cargo build scripts and needs no repo credentials.
          persist-credentials: false

      - name: Set up Rust
        run: rustup update stable && rustup default stable

      - name: Install protobuf compiler
        # The prometheus crate's build script needs protoc.
        run: sudo apt-get install -y protobuf-compiler

      - name: Install just
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: just

      # Runs the recorded workload (all read ops) twice against the same FalkorDB across the full
      # concurrency sweep + both cache modes and fails if the two runs diverge (workload_hash or any
      # per-op result digest differs). The recipe manages its own throwaway FalkorDB container and
      # writes the PR-ready A/B report to recordings/verify-report.md.
      - name: Verify no run-to-run divergence
        run: just synthetic-verify

      - name: Publish the A/B diff to the job summary
        if: ${{ always() }}
        run: |
          if [ -s recordings/verify-report.md ]; then
            cat recordings/verify-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upsert the A/B diff as a sticky PR comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          file=recordings/verify-report.md
          if [ ! -s "$file" ]; then
            echo "no verify report (the divergence gate failed earlier); skipping comment"
            exit 0
          fi
          # Posting is best-effort: fork PRs get a read-only GITHUB_TOKEN, so a 403 here must not
          # fail the job (the report is still in the job summary above).
          warn() { echo "::warning::could not post the synthetic-verify comment (read-only token on a fork PR?); see the job summary"; exit 0; }
          marker='<!-- synthetic-verify -->'
          id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            --jq "map(select(.body | contains(\"${marker}\"))) | .[0].id // empty")" || warn
          body="$(cat "$file")"
          if [ -n "$id" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${id}" -f body="$body" >/dev/null || warn
            echo "updated sticky comment ${id}"
          else
            gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -f body="$body" >/dev/null || warn
            echo "created sticky comment"
          fi
