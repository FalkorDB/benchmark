# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration — https://docs.coderabbit.ai/reference/configuration
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  # A transient CodeRabbit review error (most often "Review rate limited") must not turn the
  # "CodeRabbit" commit-status check red and fail the whole PR — CodeRabbit still reviews and
  # comments, we just don't gate the PR on a rate-limit hiccup. (Overrides the org default, which
  # currently fails the status on such errors.)
  fail_commit_status: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - master
  # Don't review vendored code or large generated/data artifacts — they aren't hand-maintained
  # here (the FalkorDB Rust client lives in vendor/ via a Cargo [patch]; *.rdb/*.jsonl are fixtures).
  path_filters:
    - "!vendor/**"
    - "!**/*.rdb"
    - "!**/*.jsonl"
    - "!Cargo.lock"
    - "!ui/package-lock.json"
  pre_merge_checks:
    # Disable the docstring-coverage check: this repo has no docstring-coverage convention, so the
    # check only produces false positives. Docs are enforced by review, not this pre-merge gate.
    docstrings:
      mode: "off"
