name: Code Coverage

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# Least privilege: the job only checks out code and uploads a coverage report.
permissions:
  contents: read

# Generate code coverage with cargo-llvm-cov and upload it to Codecov.
jobs:
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    # A FalkorDB service so `just coverage` can run the server-backed integration tests
    # (`--include-ignored`) and measure those code paths.
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Rust
        run: rustup update stable && rustup default stable

      - name: Install protobuf compiler
        # The prometheus crate's build script needs protoc.
        run: sudo apt-get install -y protobuf-compiler

      - name: Install just and cargo-llvm-cov
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: just,cargo-llvm-cov

      # Runs the same recipe developers run locally (see the Justfile). FALKORDB_HOST/PORT point
      # the integration tests at the service container above.
      - name: Generate code coverage
        env:
          FALKORDB_HOST: 127.0.0.1
          FALKORDB_PORT: 6379
        run: just coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: codecov.json
          # Don't fail the build on a transient Codecov upload/token hiccup.
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
